<title>席替えノート Ver1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f5f0e3;
    --paper-2:#efe8d6;
    --card:#fffdf7;
    --ink:#33302a;
    --ink-soft:#6f685c;
    --line:#d8cfb8;
    --grid-line:#e4dcc6;
    --teal:#1f7a6b;
    --teal-d:#16574c;
    --teal-soft:#dcebe6;
    --clay:#bd5b39;
    --clay-soft:#f4e0d6;
    --gold:#c79a3b;
    --shadow:0 2px 0 #e7dec8, 0 10px 24px -14px rgba(60,50,30,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--grid-line) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:26px 26px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:22px 18px 80px;}
  header.top{
    display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;
    border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:6px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:46px;height:46px;border-radius:11px;background:var(--teal);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:3px;padding:7px;box-shadow:var(--shadow);flex:none;
  }
  .brand .mark i{background:#bfe0d7;border-radius:2px;}
  .brand .mark i.on{background:#fffdf7;}
  h1{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:1.7rem;margin:0;letter-spacing:.04em;}
  .sub{color:var(--ink-soft);font-size:.82rem;margin-left:auto;text-align:right;max-width:330px;}
  .savechip{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;color:var(--teal-d);background:var(--teal-soft);
    border:1px solid #bcd9d0;border-radius:20px;padding:2px 10px;margin-top:4px;font-weight:700;}
  .savechip b{width:7px;height:7px;border-radius:50%;background:var(--teal);}

  nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0 22px;}
  nav.tabs button{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:.92rem;
    border:2px solid var(--ink);background:var(--card);color:var(--ink);
    padding:8px 16px;border-radius:11px 11px 0 11px;cursor:pointer;
    box-shadow:2px 2px 0 var(--ink);transition:transform .08s,background .15s;
  }
  nav.tabs button:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}
  nav.tabs button.active{background:var(--teal);color:#fff;border-color:var(--teal-d);box-shadow:2px 2px 0 var(--teal-d);}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow);}
  .card h2{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:1.12rem;margin:0 0 4px;display:flex;align-items:center;gap:8px;}
  .card h2 .tag{font-size:.66rem;background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);
    border-radius:6px;padding:1px 7px;font-weight:700;letter-spacing:.05em;}
  .card p.lead{color:var(--ink-soft);font-size:.85rem;margin:0 0 14px;}

  label.fld{display:block;font-size:.78rem;font-weight:700;color:var(--ink-soft);margin:0 0 4px;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    font-family:inherit;font-size:.92rem;color:var(--ink);background:#fffefb;
    border:1.5px solid var(--line);border-radius:9px;padding:8px 10px;width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}
  textarea{resize:vertical;min-height:90px;line-height:1.7;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
  .row > div{flex:1;min-width:120px;}

  button.btn{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;
    border:2px solid var(--teal-d);background:var(--teal);color:#fff;padding:9px 18px;border-radius:10px;
    box-shadow:2px 2px 0 var(--teal-d);transition:transform .08s;}
  button.btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--teal-d);}
  button.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--teal-d);}
  button.btn.ghost{background:var(--card);color:var(--ink);border-color:var(--ink);box-shadow:2px 2px 0 var(--ink);}
  button.btn.clay{background:var(--clay);border-color:#8f4127;box-shadow:2px 2px 0 #8f4127;}
  button.btn.sm{padding:5px 11px;font-size:.8rem;box-shadow:1px 1px 0 currentColor;}
  button.mini{border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;font-size:.74rem;
    padding:3px 8px;color:var(--ink-soft);font-weight:700;}
  button.mini:hover{border-color:var(--clay);color:var(--clay);}

  table{width:100%;border-collapse:collapse;font-size:.9rem;}
  th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--grid-line);}
  th{font-size:.72rem;color:var(--ink-soft);letter-spacing:.05em;text-transform:none;}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;font-size:.72rem;font-weight:700;border-radius:20px;padding:1px 9px;}
  .pill.m{background:#e2ecf6;color:#2c5a86;}
  .pill.f{background:#f6e2ee;color:#a23a72;}
  .pill.x{background:var(--paper-2);color:var(--ink-soft);}
  .pill.fix{background:var(--teal-soft);color:var(--teal-d);}

  .empty{color:var(--ink-soft);font-size:.86rem;text-align:center;padding:22px;border:1.5px dashed var(--line);border-radius:11px;background:#fffef9;}

  /* seat chart */
  .board{background:linear-gradient(#2f4a44,#27403a);color:#eafaf4;text-align:center;font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;letter-spacing:.5em;padding:8px;border-radius:8px;margin:0 auto 20px;max-width:560px;
    box-shadow:inset 0 0 0 3px #1d2f2b,0 4px 10px -4px rgba(0,0,0,.4);}
  .gridseats{display:grid;gap:10px;justify-content:center;margin:0 auto;}
  .island-wrap{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;}
  .island{display:grid;gap:8px;padding:12px;border:2px dashed var(--line);border-radius:14px;background:#fffef9;}
  .seat{
    width:96px;height:62px;border-radius:9px;border:1.5px solid #c9bf9f;background:#fffdf6;
    display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;
    box-shadow:0 2px 0 #e3dac2;padding:4px;text-align:center;
  }
  .seat .nm{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:.92rem;line-height:1.15;}
  .seat .meta{font-size:.62rem;color:var(--ink-soft);margin-top:2px;}
  .seat.empty{background:repeating-linear-gradient(45deg,#f3eedd,#f3eedd 6px,#ece4cf 6px,#ece4cf 12px);border-style:dashed;}
  .seat.fixed{border-color:var(--teal);box-shadow:0 2px 0 #bcd9d0,0 0 0 2px var(--teal-soft);}
  .seat.warn{border-color:var(--clay);box-shadow:0 2px 0 #e3b9a8,0 0 0 2px var(--clay-soft);}
  .seat .corner{position:absolute;top:3px;right:5px;font-size:.6rem;color:var(--teal);font-weight:700;}
  .seat .warncorner{position:absolute;top:3px;left:5px;font-size:.6rem;color:var(--clay);font-weight:700;}

  /* layout editor cells */
  .editgrid{display:grid;gap:5px;justify-content:center;margin:14px auto;}
  .cell{width:40px;height:30px;border-radius:6px;border:1.5px solid var(--line);background:#fffdf6;cursor:pointer;
    font-size:.62rem;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-weight:700;}
  .cell.off{background:repeating-linear-gradient(45deg,#efe8d6,#efe8d6 4px,#e6ddc6 4px,#e6ddc6 8px);color:#c3b896;}
  .cell.male{background:#e2ecf6;border-color:#9cc0e0;color:#2c5a86;}
  .cell.female{background:#f6e2ee;border-color:#dfa6c6;color:#a23a72;}
  .brushbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 4px;}
  .brushbar .lbl{font-size:.78rem;font-weight:700;color:var(--ink-soft);}
  .brush{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;
    border:2px solid var(--line);background:#fffdf6;color:var(--ink);padding:6px 13px;border-radius:9px;display:flex;align-items:center;gap:6px;}
  .brush .sw{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.15);}
  .brush.active{border-color:var(--ink);box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px);}
  .seat.gm{background:#eef4fb;}
  .seat.gf{background:#fbeef5;}
  .runchart .seat{cursor:pointer;transition:transform .08s;}
  .runchart .seat:hover{transform:translateY(-2px);}
  .seat.sel{box-shadow:0 0 0 3px var(--gold),0 2px 0 #e3dac2;border-color:var(--gold);transform:translateY(-2px);}
  .runhint-sel{color:var(--gold);}

  .stat{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 18px;}
  .stat .box{flex:1;min-width:120px;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;background:#fffef9;}
  .stat .box b{display:block;font-family:'Zen Maru Gothic',sans-serif;font-size:1.5rem;line-height:1.1;}
  .stat .box span{font-size:.74rem;color:var(--ink-soft);}
  .stat .box.good b{color:var(--teal);}
  .stat .box.bad b{color:var(--clay);}

  .seg{display:inline-flex;border:2px solid var(--ink);border-radius:10px;overflow:hidden;box-shadow:2px 2px 0 var(--ink);}
  .seg button{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;border:none;background:var(--card);color:var(--ink);
    padding:7px 16px;cursor:pointer;font-size:.86rem;}
  .seg button.active{background:var(--teal);color:#fff;}
  .seg button+button{border-left:2px solid var(--ink);}

  .hint{font-size:.78rem;color:var(--ink-soft);background:var(--paper-2);border-left:3px solid var(--gold);
    padding:8px 12px;border-radius:0 8px 8px 0;margin:10px 0;}
  .listrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--grid-line);font-size:.9rem;}
  .listrow:last-child{border-bottom:none;}
  .arrow{color:var(--ink-soft);font-weight:700;}
  .nbr-chip{display:inline-flex;align-items:center;gap:5px;background:#fffef9;border:1px solid var(--line);
    border-radius:20px;padding:3px 11px;margin:3px 4px 3px 0;font-size:.84rem;}
  .nbr-chip b{background:var(--teal);color:#fff;border-radius:20px;font-size:.7rem;padding:0 7px;min-width:18px;text-align:center;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;  background:var(--ink);color:#fff;font-weight:700;font-size:.86rem;padding:10px 20px;border-radius:30px;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.5);transition:.25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(max-width:560px){
    .seat{width:74px;height:54px;}
    .seat .nm{font-size:.78rem;}
    h1{font-size:1.4rem;}
  }
  /* ---- generation production ---- */
  .genoverlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,rgba(31,122,107,.82),rgba(22,40,36,.92));
    backdrop-filter:blur(3px);cursor:pointer;}
  .genoverlay.show{display:flex;animation:ovfade .25s ease;}
  @keyframes ovfade{from{opacity:0}to{opacity:1}}
  .genbox{text-align:center;color:#fff;padding:20px;}
  .genbadge{width:96px;height:96px;margin:0 auto 18px;border-radius:24px;background:#fffdf7;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:5px;padding:13px;
    box-shadow:0 12px 30px -8px rgba(0,0,0,.5);animation:badgeb 1s ease-in-out infinite;}
  .genbadge i{background:#bfe0d7;border-radius:4px;}
  .genbadge i.on{background:var(--teal);}
  @keyframes badgeb{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
  .genslot{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:2rem;letter-spacing:.04em;
    background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.5);border-radius:14px;
    padding:10px 26px;min-width:240px;display:inline-block;min-height:64px;line-height:44px;}
  .genslot .flip{display:inline-block;animation:slotflip .12s ease;}
  @keyframes slotflip{from{transform:translateY(-60%);opacity:.2}to{transform:translateY(0);opacity:1}}
  .genlabel{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:1.15rem;margin-top:16px;letter-spacing:.3em;}
  .genbar{width:240px;height:8px;border-radius:8px;background:rgba(255,255,255,.25);margin:14px auto 4px;overflow:hidden;}
  .genbar i{display:block;height:100%;width:40%;border-radius:8px;background:#ffe08a;
    background-image:linear-gradient(90deg,#ffd166,#fff3c4,#ffd166);animation:barsl 1s linear infinite;}
  @keyframes barsl{from{transform:translateX(-120%)}to{transform:translateX(360%)}}
  .genskip{margin-top:14px;font-size:.78rem;color:rgba(255,255,255,.8);}
  .seat.pop{animation:seatpop .4s cubic-bezier(.2,1.3,.4,1) both;}
  @keyframes seatpop{0%{transform:scale(.5) translateY(10px);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden;display:none;}
  #confetti.show{display:block;}
  .confpc{position:absolute;width:11px;height:14px;top:-20px;border-radius:2px;animation:conffall linear forwards;}
  @keyframes conffall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(104vh) rotate(720deg);opacity:.9}}
  .soundtoggle{display:inline-flex;align-items:center;gap:7px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:.82rem;border:2px solid var(--line);background:#fffdf6;border-radius:20px;padding:5px 13px;cursor:pointer;color:var(--ink);}
  .soundtoggle .dot{width:9px;height:9px;border-radius:50%;background:#c9bf9f;}
  .soundtoggle.on{border-color:var(--teal);color:var(--teal-d);background:var(--teal-soft);}
  .soundtoggle.on .dot{background:var(--teal);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="mark"><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i></div>
      <div>
        <h1>席替えノート <span style="font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:.78rem;color:#fff;background:var(--teal);border-radius:6px;padding:1px 8px;vertical-align:middle;letter-spacing:.02em;">Ver 1.0</span></h1>
        <div style="font-size:.78rem;color:var(--ink-soft);">配慮・関係・履歴をふまえた座席づくり</div>
      </div>
    </div>
    <div class="sub">
      名簿・配慮・履歴はこの端末のブラウザに保存され、次に開いたときも残ります。

    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="roster" class="active">① 名簿</button>
    <button data-tab="layout">② 教室レイアウト</button>
    <button data-tab="care">③ 配慮設定</button>

  <main id="view"></main>

    </div>
  </footer>
</div>

  <div class="genbox">
    <div class="genbadge" id="genBadge"><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i></div>
    <div class="genslot" id="genSlot">？？？</div>

    <div class="genlabel">席がえ中…</div>
    <div class="genskip">画面をタップでスキップ</div>

</div>

<script>
/* ============================= storage ============================= */
const Store = {
  async get(key){
    if(window.storage){ try{const r=await window.storage.get(key); return r?r.value:null;}catch(e){return null;} }
    try{return localStorage.getItem(key);}catch(e){return null;}
  },
  async set(key,val){
    if(window.storage){ try{await window.storage.set(key,val);}catch(e){} }
    else{ try{localStorage.setItem(key,val);}catch(e){} }
  }
};
const KEY='sekigae:data:v1';

/* ============================= state ============================= */
let state = {
  students:[],            // {id,name,gender,note}
  layout:{mode:'grid', rows:5, cols:6, frontBack:false, disabled:[], groups:8, perGroup:4, seatGender:{}},
  fixed:[],               // {id,studentId,type:'frontRows'|'seat', rows?, seatKey?}
  ng:[],                  // [id1,id2]
  rec:[],                 // [id1,id2]
  history:[],             // {id,date,month,label,layout,assignment}
  current:null,           // {layout, assignment, stats}
  settings:{sound:true}   // 演出のBGM・効果音
};
let activeTab='roster';
let brush='off';   // off | any | m | f  — レイアウト編集の塗りツール
let careUnlocked=false;   // 配慮設定タブのセッション解除状態
let selSeat=null;         // 手動入れ替えで選択中の席
function hashPass(s){ let h=5381; for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0; return 'h'+h.toString(36); }

function uid(){return Math.random().toString(36).slice(2,9);}
async function save(){ await Store.set(KEY, JSON.stringify(state)); flashSaved(); }
function flashSaved(){ const el=document.getElementById('saveState'); if(el){el.textContent='保存しました '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});} }
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function nameOf(id){const s=state.students.find(x=>x.id===id);return s?s.name:'(不明)';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============================= sound & production ============================= */
let audioCtx=null, masterGain=null;
function ac(){
  if(!audioCtx){
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return null;
    audioCtx=new AC(); masterGain=audioCtx.createGain(); masterGain.gain.value=0.5; masterGain.connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function soundOn(){return state.settings&&state.settings.sound;}
function tone(freq,t0,dur,opt){
  const c=ac(); if(!c)return; opt=opt||{};
  const o=c.createOscillator(), g=c.createGain();
  o.type=opt.type||'triangle'; o.frequency.value=freq; o.connect(g); g.connect(masterGain);
  const t=c.currentTime+t0, gain=opt.gain==null?0.18:opt.gain;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain,t+(opt.attack||0.012));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function noiseHit(t0,dur,gain,hp){
  const c=ac(); if(!c)return;
  const b=c.createBuffer(1,Math.max(1,Math.floor(c.sampleRate*dur)),c.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=c.createBufferSource(); s.buffer=b;
  const f=c.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||1800;
  const g=c.createGain(); const t=c.currentTime+t0;
  g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.connect(f); f.connect(g); g.connect(masterGain); s.start(t); s.stop(t+dur);
}
const NOTE={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,C6:1046.5};
// cheerful build-up jingle (~1.5s). returns total ms.
function playBuildup(){
  if(!soundOn())return 1500;
  const c=ac(); if(!c)return 1500;
  // bouncy bass
  const bass=[0,.2,.4,.6,.8,1.0,1.2,1.4];
  bass.forEach((t,i)=>tone(i%2?98:130.81,t,0.18,{type:'square',gain:0.10}));

  const mel=[['C5',0],['E5',.2],['G5',.4],['E5',.6],['G5',.8],['C6',1.0],['B4',1.2],['D5',1.4]];
  mel.forEach(([n,t])=>tone(NOTE[n],t,0.18,{type:'triangle',gain:0.16}));
  // accelerating snare roll for tension
  let t=0; while(t<1.5){ noiseHit(t,0.05,0.12,2200); t += 0.16 - t*0.06; }
  return 1500;
}

/* ============================= seat / algorithm ============================= */
function buildSeats(layout){
  const seats=[];
  if(layout.mode==='grid'){
    for(let r=0;r<layout.rows;r++)for(let c=0;c<layout.cols;c++){
      const key=`g_${r}_${c}`;
      if((layout.disabled||[]).includes(key))continue;
      seats.push({key,r,c,group:null});
    }
  }else{
    for(let gi=0;gi<layout.groups;gi++){
      const per=layout.perGroup, gcols=per<=2?per:2;
      for(let s=0;s<per;s++) seats.push({key:`p_${gi}_${s}`, r:Math.floor(s/gcols), c:s%gcols, group:gi});
    }
  }
  return seats;
}
function neighborMap(seats,layout){
  const map={}; seats.forEach(s=>map[s.key]=new Set());
  if(layout.mode==='grid'){
    const byPos={}; seats.forEach(s=>byPos[`${s.r},${s.c}`]=s);
    seats.forEach(s=>{
      const cand=[[s.r,s.c-1],[s.r,s.c+1]];
      if(layout.frontBack){cand.push([s.r-1,s.c],[s.r+1,s.c]);}
      cand.forEach(([r,c])=>{const n=byPos[`${r},${c}`]; if(n)map[s.key].add(n.key);});
    });
  }else{
    const byG={}; seats.forEach(s=>{(byG[s.group]=byG[s.group]||[]).push(s);});
    Object.values(byG).forEach(arr=>arr.forEach(a=>arr.forEach(b=>{if(a.key!==b.key)map[a.key].add(b.key);})));
  }
  return map;
}
function pairKey(a,b){return a<b?a+'|'+b:b+'|'+a;}
function pastCounts(history){
  const counts={};
  history.forEach(h=>{
    const seats=buildSeats(h.layout), nm=neighborMap(seats,h.layout), asg=h.assignment;
    seats.forEach(s=>{
      const sa=asg[s.key]; if(!sa)return;
      nm[s.key].forEach(nk=>{const sb=asg[nk]; if(!sb||sa>=sb)return; counts[pairKey(sa,sb)]=(counts[pairKey(sa,sb)]||0)+1;});
    });
  });
  return counts;
}
function adjacentPairs(asg,nmap){
  const out=new Set();
  Object.keys(nmap).forEach(k=>{const a=asg[k];if(!a)return;nmap[k].forEach(nk=>{const b=asg[nk];if(b&&a<b)out.add(pairKey(a,b));});});
  return out;
}
function cost(asg,seats,nmap,ng,rec,past){
  let c=0; const adj=adjacentPairs(asg,nmap);
  const ngS=new Set(ng.map(p=>pairKey(p[0],p[1])));
  adj.forEach(pk=>{ if(ngS.has(pk))c+=10000; if(past[pk])c+=8*past[pk]; });
  rec.forEach(p=>{ if(!adj.has(pairKey(p[0],p[1])))c+=60; });
  return c;
}
function rnd(n){return Math.floor(Math.random()*n);}
function solve(students,layout,cons,past,opts={}){
  const restarts=opts.restarts||60, iters=opts.iters||900;
  const seats=buildSeats(layout), nmap=neighborMap(seats,layout);
  const ids=students.map(s=>s.id);
  if(ids.length>seats.length) return {error:`生徒 ${ids.length} 人に対して席が ${seats.length} 席しかありません。`};
  const allowed={}, pin={};
  // --- gender-designated seats ---
  const seatGender=layout.seatGender||{};
  const hasGenderSeats=Object.values(seatGender).some(v=>v==='m'||v==='f');
  const genderSet=(stu)=>{
    if(!hasGenderSeats) return null;            // no gender restriction in this room
    return new Set(seats.filter(s=>{
      const d=seatGender[s.key];                 // undefined/'any' = どちらでも
      if(d!=='m'&&d!=='f') return true;          // open seat: anyone
      return d===stu.gender;                     // gendered seat: must match
    }).map(s=>s.key));
  };
  const inter=(a,b)=> a==null?b : b==null?a : new Set([...a].filter(x=>b.has(x)));
  students.forEach(s=>allowed[s.id]=genderSet(s));
  const byId={}; students.forEach(s=>byId[s.id]=s);
  (cons.fixed||[]).forEach(f=>{
    let set=null;
    if(f.type==='seat'){ if(seats.find(s=>s.key===f.seatKey)){pin[f.studentId]=f.seatKey; set=new Set([f.seatKey]);} }
    else if(f.type==='frontRows'){ set=new Set(seats.filter(s=>s.r<f.rows).map(s=>s.key)); }
    if(set) allowed[f.studentId]=inter(allowed[f.studentId], set);
  });
  const ok=(id,k)=>!allowed[id]||allowed[id].has(k);
  let best=null,bestC=Infinity;
  const seatKeys=seats.map(s=>s.key);
  for(let R=0;R<restarts;R++){
    const asg={},used=new Set(); let bad=false;
    Object.entries(pin).forEach(([id,k])=>{if(used.has(k))bad=true; asg[k]=id; used.add(k);});
    if(bad)continue;
    const constrained=ids.filter(id=>allowed[id]&&!pin[id]);
    let fail=false;
    constrained.forEach(id=>{const o=[...allowed[id]].filter(k=>!used.has(k)); if(!o.length){fail=true;return;} const k=o[rnd(o.length)]; asg[k]=id; used.add(k);});
    if(fail)continue;
    const free=ids.filter(id=>!allowed[id]);
    const rem=seatKeys.filter(k=>!used.has(k));
    for(let i=rem.length-1;i>0;i--){const j=rnd(i+1);[rem[i],rem[j]]=[rem[j],rem[i]];}
    free.forEach((id,i)=>asg[rem[i]]=id);
    let cur=cost(asg,seats,nmap,cons.ng||[],cons.rec||[],past);
    for(let it=0;it<iters;it++){
      const k1=seatKeys[rnd(seatKeys.length)],k2=seatKeys[rnd(seatKeys.length)]; if(k1===k2)continue;
      const s1=asg[k1],s2=asg[k2];
      if(s1&&pin[s1])continue; if(s2&&pin[s2])continue;
      if(s1&&!ok(s1,k2))continue; if(s2&&!ok(s2,k1))continue;
      if(s2===undefined){asg[k2]=s1;delete asg[k1];} else if(s1===undefined){asg[k1]=s2;delete asg[k2];} else {asg[k1]=s2;asg[k2]=s1;}
      const nc=cost(asg,seats,nmap,cons.ng||[],cons.rec||[],past);
      if(nc<=cur)cur=nc;
      else{ if(s2===undefined){asg[k1]=s1;delete asg[k2];} else if(s1===undefined){asg[k2]=s2;delete asg[k1];} else {asg[k1]=s1;asg[k2]=s2;} }
    }
    if(cur<bestC){bestC=cur;best={...asg};}
    if(bestC===0)break;
  }
  if(!best) return {error:'条件を満たす配置が見つかりませんでした。固定席の条件がきびしすぎないか確認してください。'};
  // stats
  const adj=adjacentPairs(best,nmap);
  const ngHit=(cons.ng||[]).filter(p=>adj.has(pairKey(p[0],p[1])));
  const recHit=(cons.rec||[]).filter(p=>adj.has(pairKey(p[0],p[1])));
  const repeats=[...adj].filter(pk=>past[pk]);
  return {assignment:best, cost:bestC, stats:{ngHit, recHit, recTotal:(cons.rec||[]).length, repeats}};
}

// counts of seats by designation, and students by gender
function tallies(students,layout){
  const seats=buildSeats(layout), sg=layout.seatGender||{};
  let M=0,F=0,A=0; seats.forEach(s=>{const d=sg[s.key]; if(d==='m')M++; else if(d==='f')F++; else A++;});
  let nm=0,nf=0,nx=0; students.forEach(s=>{if(s.gender==='m')nm++; else if(s.gender==='f')nf++; else nx++;});
  return {M,F,A,total:seats.length, nm,nf,nx, nstu:students.length, hasGender:(M+F)>0};
}
// returns array of problem messages (empty = OK)
function feasibility(students,layout){
  const t=tallies(students,layout), msgs=[];
  if(t.nstu>t.total) msgs.push(`生徒 ${t.nstu}人に対して席が ${t.total}席しかありません。`);
  if(t.hasGender){
    if(t.nx>t.A) msgs.push(`性別を設定していない生徒が ${t.nx}人いますが、「どちらでも」席は ${t.A}席です。生徒の性別を設定するか、どちらでも席を増やしてください。`);
    if(t.nm+t.nx>t.M+t.A) msgs.push(`男子が座れる席(男子席+どちらでも)が不足しています。`);
    if(t.nf+t.nx>t.F+t.A) msgs.push(`女子が座れる席(女子席+どちらでも)が不足しています。`);
  }
  return msgs;
}

  // layout: 6x6 grid, back row trimmed to 2 seats (uneven columns) -> 32 seats

  // front row = どちらでも(A); rows 1-5: left 3 cols 男子席, right 3 cols 女子席
  for(let r=1;r<6;r++)for(let c=0;c<6;c++){

  // generate two past months so 「過去の隣」 has data
  const cons={fixed,ng,rec};

  view.querySelectorAll('[data-edit]').forEach(inp=>inp.onchange=()=>{
    const st=state.students.find(x=>x.id===inp.dataset.id); if(st){st[inp.dataset.edit]=inp.value.trim();save();}
  });
}

/* ---------- ② layout ---------- */
function pruneLayout(L){
  if(L.mode==='grid'){
    const valid=new Set(); for(let r=0;r<L.rows;r++)for(let c=0;c<L.cols;c++)valid.add(`g_${r}_${c}`);
    L.disabled=(L.disabled||[]).filter(k=>valid.has(k));
    Object.keys(L.seatGender||{}).forEach(k=>{if(k.startsWith('g_')&&!valid.has(k))delete L.seatGender[k];});
  }else{
    const valid=new Set(); for(let g=0;g<L.groups;g++)for(let s=0;s<L.perGroup;s++)valid.add(`p_${g}_${s}`);
    Object.keys(L.seatGender||{}).forEach(k=>{if(k.startsWith('p_')&&!valid.has(k))delete L.seatGender[k];});
  }
}
function paint(L,key){
  L.disabled=L.disabled||[]; L.seatGender=L.seatGender||{};
  const isGroup=key.startsWith('p_');
  if(brush==='off'){ if(isGroup)return; if(!L.disabled.includes(key))L.disabled.push(key); delete L.seatGender[key]; }
  else{
    if(!isGroup)L.disabled=L.disabled.filter(x=>x!==key);
    if(brush==='m'||brush==='f')L.seatGender[key]=brush; else delete L.seatGender[key];
  }
}
function brushPalette(){
  const items=[['off','席なし','repeating-linear-gradient(45deg,#efe8d6,#efe8d6 3px,#e6ddc6 3px,#e6ddc6 6px)'],
    ['any','どちらでも','#fffdf6'],['m','男子席','#e2ecf6'],['f','女子席','#f6e2ee']];
  return `<div class="brushbar"><span class="lbl">ぬるツール:</span>${items.map(([v,t,c])=>
    `<button class="brush ${brush===v?'active':''}" data-brush="${v}"><span class="sw" style="background:${c}"></span>${t}</button>`).join('')}
    <span style="font-size:.74rem;color:var(--ink-soft)">← 選んでマスをクリック</span></div>`;
}
function renderLayout(){
  const L=state.layout; L.seatGender=L.seatGender||{};
  const seatCount=buildSeats(L).length, t=tallies(state.students,L);
  const probs=feasibility(state.students,L);
  view.innerHTML=`
  <div class="card">
    <h2>② 教室レイアウト</h2>
    <p class="lead">座席の形を選び、マスをクリックして「席なし / どちらでも / 男子席 / 女子席」を塗り分けます。<b>列ごとに席数が違ってもOK</b> — いらないマスを「席なし」にしてください。男子席・女子席を指定すると、その性別の生徒だけがそこに入るよう自動で配置します。</p>
    <div class="seg" id="modeSeg">
      <button data-mode="grid" class="${L.mode==='grid'?'active':''}">整列(前向き)</button>
      <button data-mode="group" class="${L.mode==='group'?'active':''}">グループ(島)</button>
    </div>
    ${L.mode==='grid'?gridControls(L):groupControls(L)}
    ${brushPalette()}
    <div style="text-align:center;font-size:.7rem;color:var(--ink-soft);letter-spacing:.4em;margin:6px 0 4px">▲ 黒板がわ ▲</div>
    ${L.mode==='grid'?gridEditor(L):groupEditor(L)}
    <div class="stat" style="margin-top:18px">
      <div class="box"><b>${seatCount}</b><span>用意される席</span></div>
      <div class="box"><b>${t.A}</b><span>どちらでも席</span></div>
      <div class="box" style="border-color:#9cc0e0"><b style="color:#2c5a86">${t.M}</b><span>男子席</span></div>
      <div class="box" style="border-color:#dfa6c6"><b style="color:#a23a72">${t.F}</b><span>女子席</span></div>
    </div>
    <div class="stat">
      <div class="box"><b>${t.nstu}</b><span>生徒(合計)</span></div>
      <div class="box"><b style="color:#2c5a86">${t.nm}</b><span>男子</span></div>
      <div class="box"><b style="color:#a23a72">${t.nf}</b><span>女子</span></div>
      <div class="box"><b style="color:var(--ink-soft)">${t.nx}</b><span>性別未設定</span></div>
    </div>
    ${probs.length?`<div class="hint" style="border-color:var(--clay)">${probs.map(esc).join('<br>')}</div>`:
      `<div class="hint">この条件で席替えできます。${t.hasGender&&t.nx>0?'性別未設定の生徒は「どちらでも席」に入ります。':''}</div>`}
  </div>`;

  view.querySelectorAll('#modeSeg button').forEach(b=>b.onclick=()=>{L.mode=b.dataset.mode;save();render();});
  view.querySelectorAll('[data-brush]').forEach(b=>b.onclick=()=>{brush=b.dataset.brush;render();});
  view.querySelectorAll('.cell[data-k]').forEach(c=>c.onclick=()=>{paint(L,c.dataset.k);save();render();});
  if(L.mode==='grid'){
    ['rows','cols'].forEach(k=>{const el=document.getElementById('L_'+k); if(el)el.onchange=()=>{L[k]=Math.max(1,Math.min(12,+el.value||1));pruneLayout(L);save();render();};});
    const fb=document.getElementById('L_fb'); if(fb)fb.onchange=()=>{L.frontBack=fb.checked;save();render();};
  }else{
    ['groups','perGroup'].forEach(k=>{const el=document.getElementById('L_'+k); if(el)el.onchange=()=>{L[k]=Math.max(1,Math.min(k==='perGroup'?6:12,+el.value||1));pruneLayout(L);save();render();};});
  }
}
function gridControls(L){
  return `
  <div class="row" style="margin-top:14px">
    <div style="flex:0;min-width:90px"><label class="fld">行(たて)</label><input type="number" id="L_rows" value="${L.rows}" min="1" max="12"></div>
    <div style="flex:0;min-width:90px"><label class="fld">列(よこ)</label><input type="number" id="L_cols" value="${L.cols}" min="1" max="12"></div>
    <div style="flex:2"><label class="fld">隣の数え方</label>
      <label style="font-weight:400;font-size:.86rem"><input type="checkbox" id="L_fb" ${L.frontBack?'checked':''}> 前後の席も「隣」として扱う(初期は左右のみ)</label></div>
  </div>`;
}
function gridEditor(L){
  let grid=`<div class="editgrid" style="grid-template-columns:repeat(${L.cols},40px)">`;
  for(let r=0;r<L.rows;r++)for(let c=0;c<L.cols;c++){
    const k=`g_${r}_${c}`, off=(L.disabled||[]).includes(k), g=(L.seatGender||{})[k];
    const cls=off?'off':(g==='m'?'male':g==='f'?'female':'');
    const txt=off?'×':(g==='m'?'男':g==='f'?'女':'');
    grid+=`<div class="cell ${cls}" data-k="${k}">${txt}</div>`;
  }
  return grid+`</div>`;
}
function groupControls(L){
  return `
  <div class="row" style="margin-top:14px">
    <div style="flex:0;min-width:110px"><label class="fld">班の数</label><input type="number" id="L_groups" value="${L.groups}" min="1" max="12"></div>
    <div style="flex:0;min-width:110px"><label class="fld">1班の人数</label><input type="number" id="L_perGroup" value="${L.perGroup}" min="2" max="6"></div>
  </div>
  <div class="hint">同じ班の生徒どうしは、すべて「隣」として扱われます。班の中で席に男女を指定することもできます。</div>`;
}
function groupEditor(L){
  let html=`<div class="island-wrap" style="margin-top:6px">`;
  const per=L.perGroup,gcols=per<=2?per:2;
  for(let g=0;g<L.groups;g++){
    html+=`<div class="island" style="grid-template-columns:repeat(${gcols},40px)">`;
    for(let s=0;s<per;s++){
      const k=`p_${g}_${s}`, gd=(L.seatGender||{})[k];
      const cls=gd==='m'?'male':gd==='f'?'female':'';
      const txt=gd==='m'?'男':gd==='f'?'女':(g+1);
      html+=`<div class="cell ${cls}" data-k="${k}">${txt}</div>`;
    }
    html+=`</div>`;
  }
  return html+`</div>`;
}

    document.getElementById('pwSet').onclick=()=>{

    };
    return;
  }

  // --- ロック中:解除画面 ---
  if(!careUnlocked){
    view.innerHTML=`
    <div class="card" style="max-width:480px;margin:30px auto;text-align:center">
      <div style="font-size:2.4rem;line-height:1;margin:6px 0 4px">🔒</div>
      <h2 style="justify-content:center">配慮設定はロックされています</h2>
      <p class="lead">固定席・離したいペア・近づけたいペアなど、子どもに見せたくない情報です。パスワードを入力すると開けます。</p>
      <div style="max-width:280px;margin:0 auto"><input type="password" id="pwIn" placeholder="パスワード" autofocus></div>
      <div id="pwErr2" style="color:var(--clay);font-size:.82rem;margin-top:8px;min-height:18px"></div>
      <div style="margin-top:12px"><button class="btn" id="pwGo">ロックを解除</button></div>
      <div style="margin-top:16px"><a href="#" id="pwForgot" style="font-size:.76rem;color:var(--ink-soft)">パスワードを忘れた場合</a></div>
    </div>`;
    const tryUnlock=()=>{
      const v=document.getElementById('pwIn').value;
      if(hashPass(v)===state.settings.carePass){ careUnlocked=true; render(); }
      else { document.getElementById('pwErr2').textContent='パスワードが違います。'; document.getElementById('pwIn').value=''; }
    };
    document.getElementById('pwGo').onclick=tryUnlock;
    document.getElementById('pwIn').onkeydown=e=>{ if(e.key==='Enter')tryUnlock(); };
    document.getElementById('pwForgot').onclick=e=>{
      e.preventDefault();
      if(confirm('パスワードをリセットします。安全のため、いまの配慮設定(固定席・離したい/近づけたいペア)はすべて消去されます。名簿・教室・履歴は残ります。よろしいですか?')){
        state.fixed=[]; state.ng=[]; state.rec=[]; delete state.settings.carePass; careUnlocked=false; save(); render();
        toast('リセットしました。新しいパスワードを設定してください');
      }
    };
    return;
  }

  // --- 解除済み:通常の配慮設定 ---
  const opts=state.students.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  const seats=buildSeats(state.layout);
  const seatOpts=seats.map(s=>`<option value="${s.key}">${seatLabel(s,state.layout)}</option>`).join('');
  const lockBar=`<div class="card" style="display:flex;align-items:center;gap:12px;border-color:var(--teal);background:var(--teal-soft)">
    <span style="font-weight:700;color:var(--teal-d);font-family:'Zen Maru Gothic',sans-serif">🔓 配慮設定を表示中</span>
    <span style="font-size:.78rem;color:var(--ink-soft);flex:1">ほかのタブに移ると自動で再ロックされます。</span>
    <button class="btn ghost sm" id="careLock">今すぐロック</button>
    <button class="mini" id="carePwChange">パスワード変更</button>
  </div>`;
  view.innerHTML=lockBar+`
  <div class="card">
    <h2>固定席 <span class="tag">${state.fixed.length}</span></h2>
    <p class="lead">視力・聴力・支援など、配置を固定したい生徒を指定します。「前方◯列のどこか」または「特定の席」を選べます。</p>

  <div class="card">
    <h2>離したいペア(NG) <span class="tag">${state.ng.length}</span></h2>

    if(hashPass(cur)!==state.settings.carePass){toast('現在のパスワードが違います');return;}

        <div class="box ${stats.repeats.length?'':'good'}"><b>${stats.repeats.length}</b><span>過去に隣だった組の再発</span></div>
      </div>
      ${stats.ngHit.length?`<div class="hint" style="border-color:var(--clay)">NGペアが隣接しています:${stats.ngHit.map(p=>esc(nameOf(p[0]))+'と'+esc(nameOf(p[1]))).join('、')}。「別の案を出す」か、下の座席図で手動で入れ替えてください。</div>`:''}
      <div class="hint">手動で入れ替え:座席をタップ→交換したいもう一つの席をタップすると、2人を入れ替えます(空席への移動もできます)。${selSeat?'　<b>選択中の席をもう一度タップで選択解除。</b>':''}</div>
      <div class="runchart">${seatChart(state.current.layout,assignment,stats.ngHit)}</div>`;
    bindSwap();
  }
  function bindSwap(){
    result.querySelectorAll('.runchart .seat[data-k]').forEach(el=>el.onclick=()=>{
      const k=el.dataset.k;
      if(selSeat===null){ selSeat=k; showCurrent(); return; }
      if(selSeat===k){ selSeat=null; showCurrent(); return; }
      const asg=state.current.assignment;
      const a=asg[selSeat], b=asg[k];
      if(a===undefined)delete asg[k]; else asg[k]=a;
      if(b===undefined)delete asg[selSeat]; else asg[selSeat]=b;
      state.current.stats=computeStats(state.current.layout,asg);
      selSeat=null; save(); showCurrent();
    });
  }
  showCurrent();

  const gen=async ()=>{
    if(state.students.length===0)return toast('先に名簿を登録してください');
    selSeat=null;
    const past=pastCounts(state.history);
    const res=solve(state.students,state.layout,{fixed:state.fixed,ng:state.ng,rec:state.rec},past,{restarts:70,iters:1000});
    if(res.error){result.innerHTML=`<div class="hint" style="border-color:var(--clay)">${res.error}</div>`;return;}
    if(soundOn())ac();                       // unlock audio on this user gesture
    const gb=document.getElementById('genBtn'), rbb=document.getElementById('regenBtn');
    if(gb)gb.disabled=true; if(rbb)rbb.disabled=true;
    await runProduction();                   // overlay + BGM build-up
    state.current={layout:JSON.parse(JSON.stringify(state.layout)),assignment:res.assignment,stats:res.stats};
    save();render();                         // redraw (run tab) with the new chart
    revealSeats();                           // pop-in + fanfare + confetti
  };
  document.getElementById('genBtn').onclick=gen;
  const rb=document.getElementById('regenBtn'); if(rb)rb.onclick=gen;
  const st=document.getElementById('soundToggle');
  if(st)st.onclick=()=>{ state.settings.sound=!state.settings.sound; if(state.settings.sound)ac(); save();render(); };
  const sh=document.getElementById('saveHist');
  if(sh)sh.onclick=()=>{
    const d=document.getElementById('saveDate').value||today;
    const month=(+d.slice(5,7))+'月';
    state.history.unshift({id:uid(),date:d,month,label:document.getElementById('saveLabel').value.trim(),
      layout:state.current.layout, assignment:state.current.assignment});
    save();toast('履歴に保存しました');activeTab='history';render();
  };
}

function computeStats(L,asg){
  const seats=buildSeats(L), nmap=neighborMap(seats,L);
  const adj=adjacentPairs(asg,nmap);
  const past=pastCounts(state.history);
  const ngHit=state.ng.filter(p=>adj.has(pairKey(p[0],p[1])));
  const recHit=state.rec.filter(p=>adj.has(pairKey(p[0],p[1])));
  const repeats=[...adj].filter(pk=>past[pk]);
  return {ngHit,recHit,recTotal:state.rec.length,repeats};
}
function seatChart(L,asg,ngHit){
  const ngIds=new Set(); (ngHit||[]).forEach(p=>{ngIds.add(p[0]);ngIds.add(p[1]);});
  const fixedSet=new Set(state.fixed.map(f=>f.studentId));
  const sg=L.seatGender||{};
  const seatHTML=(s)=>{
    const gd=sg[s.key], gcls=gd==='m'?'gm':gd==='f'?'gf':'';
    const gmark=gd==='m'?'<span class="corner" style="color:#2c5a86">♂</span>':gd==='f'?'<span class="corner" style="color:#a23a72">♀</span>':'';
    const sel=(selSeat===s.key)?' sel':'';
    const sid=asg[s.key];
    if(!sid)return `<div class="seat empty ${gcls}${sel}" data-k="${s.key}">${gmark}<span class="meta">空席</span></div>`;
    const st=state.students.find(x=>x.id===sid)||{name:'?'};
    const warn=ngIds.has(sid), fix=fixedSet.has(sid);
    return `<div class="seat ${gcls} ${fix?'fixed':''} ${warn?'warn':''}${sel}" data-k="${s.key}">
      ${fix?'<span class="corner">固</span>':gmark}${warn?'<span class="warncorner">NG</span>':''}
      <span class="nm">${esc(st.name)}</span>${st.note?`<span class="meta">${esc(st.note)}</span>`:''}</div>`;
  };
  if(L.mode==='grid'){
    const seats=buildSeats(L); const byPos={}; seats.forEach(s=>byPos[`${s.r},${s.c}`]=s);
    let html=`<div class="board">こ く ば ん</div><div class="gridseats" style="grid-template-columns:repeat(${L.cols},auto)">`;
    for(let r=0;r<L.rows;r++)for(let c=0;c<L.cols;c++){
      const s=byPos[`${r},${c}`];
      html+= s?seatHTML(s):`<div></div>`;
    }
    html+=`</div>`; return html;
  }else{
    const seats=buildSeats(L); const byG={}; seats.forEach(s=>{(byG[s.group]=byG[s.group]||[]).push(s);});
    let html=`<div class="board">こ く ば ん</div><div class="island-wrap">`;
    Object.keys(byG).forEach(g=>{
      const per=L.perGroup,gcols=per<=2?per:2;
      html+=`<div class="island" style="grid-template-columns:repeat(${gcols},auto)">`+byG[g].map(seatHTML).join('')+`</div>`;
    });
    html+=`</div>`; return html;
  }
}

/* ---------- ⑤ history ---------- */
function renderHistory(){
  const opts=state.students.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  view.innerHTML=`
  <div class="card">
    <h2>⑤ 過去の隣 しらべ</h2>
    <p class="lead">保存した履歴をもとに、ある生徒がこれまで誰と隣り合ってきたかを集計します。関わりの薄い相手や、続いている組み合わせの確認に。</p>
    ${state.history.length===0?'<div class="empty">まだ履歴がありません。「④ 席替え実行」で案を保存すると、ここに反映されます。</div>':`
    <div class="row"><div style="flex:1"><label class="fld">生徒を選ぶ</label><select id="nbrSel">${opts}</select></div></div>
    <div id="nbrResult" style="margin-top:12px"></div>`}
  </div>
  <div class="card">
    <h2>座席の履歴 <span class="tag">${state.history.length}件</span></h2>
    ${state.history.length===0?'<div class="empty">保存された座席はまだありません。</div>':
      state.history.map(h=>`<div class="listrow" style="align-items:flex-start;flex-wrap:wrap">
        <div style="min-width:64px"><span class="pill fix">${h.month}</span></div>
        <div style="flex:1">
          <b>${h.date}</b> ${h.label?`<span style="color:var(--ink-soft);font-size:.84rem">— ${esc(h.label)}</span>`:''}
          <div style="font-size:.78rem;color:var(--ink-soft)">${h.layout.mode==='grid'?`整列 ${h.layout.rows}×${h.layout.cols}`:`グループ ${h.layout.groups}班`} ・ ${Object.keys(h.assignment).filter(k=>h.assignment[k]).length}人</div>
        </div>
        <button class="mini" data-view="${h.id}">座席を見る</button>
        <button class="mini" data-hdel="${h.id}">削除</button>
        <div class="hview" id="hv_${h.id}" style="width:100%;display:none;margin-top:10px"></div>
      </div>`).join('')}
  </div>`;

  const sel=document.getElementById('nbrSel');
  if(sel){
    const showNbr=()=>{
      const id=sel.value; const counts={};
      state.history.forEach(h=>{
        const seats=buildSeats(h.layout),nm=neighborMap(seats,h.layout);
        Object.keys(nm).forEach(k=>{ if(h.assignment[k]!==id)return; nm[k].forEach(nk=>{const o=h.assignment[nk]; if(o)counts[o]=(counts[o]||0)+1;}); });
      });
      const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      const never=state.students.filter(s=>s.id!==id&&!counts[s.id]);
      const box=document.getElementById('nbrResult');
      box.innerHTML=`
        <div style="font-size:.85rem;font-weight:700;margin-bottom:4px">これまで隣だった相手</div>
        ${entries.length?entries.map(([oid,c])=>`<span class="nbr-chip">${esc(nameOf(oid))}<b>${c}</b></span>`).join(''):'<span style="color:var(--ink-soft);font-size:.85rem">まだありません</span>'}
        <div style="font-size:.85rem;font-weight:700;margin:14px 0 4px">まだ一度も隣になっていない相手 <span style="color:var(--ink-soft);font-weight:400">(${never.length}人)</span></div>
        ${never.length?never.map(s=>`<span class="nbr-chip" style="border-style:dashed">${esc(s.name)}</span>`).join(''):'<span style="color:var(--ink-soft);font-size:.85rem">全員と隣になりました</span>'}`;
    };
    sel.onchange=showNbr; showNbr();
  }
  view.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{
    const h=state.history.find(x=>x.id===b.dataset.view); const box=document.getElementById('hv_'+h.id);
    if(box.style.display==='none'){box.style.display='block';box.innerHTML=seatChart(h.layout,h.assignment,[]);b.textContent='閉じる';}
    else{box.style.display='none';box.innerHTML='';b.textContent='座席を見る';}
  });
  view.querySelectorAll('[data-hdel]').forEach(b=>b.onclick=()=>{state.history=state.history.filter(x=>x.id!==b.dataset.hdel);save();render();});
}

/* ============================= boot ============================= */
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{ if(b.dataset.tab!=='care')careUnlocked=false; activeTab=b.dataset.tab; render(); });
(async function(){
  const raw=await Store.get(KEY);
  if(raw){ try{ const d=JSON.parse(raw); state={...state,...d, layout:{...state.layout,...(d.layout||{})}, settings:{...state.settings,...(d.settings||{})}}; }catch(e){} }
  document.getElementById('saveState').textContent = raw?'前回のデータを読み込みました':'新規データではじめます';
  render();
})();
</script>
